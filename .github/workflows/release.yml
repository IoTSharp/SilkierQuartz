name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./SilkierQuartz.sln

      - name: Build
        run: dotnet build ./SilkierQuartz.sln --configuration Release --no-restore /p:GeneratePackageOnBuild=false

      - name: Pack release artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ./artifacts
          dotnet pack ./src/Quartz.Plugins.RecentHistory/Quartz.Plugins.RecentHistory.csproj --configuration Release --no-restore --output ./artifacts /p:GeneratePackageOnBuild=false /p:Version="$VERSION"
          dotnet pack ./src/Quartz.Plugins.RecentHistory.EFCoreSqlServer/Quartz.Plugins.RecentHistory.EFCoreSqlServer.csproj --configuration Release --no-restore --output ./artifacts /p:GeneratePackageOnBuild=false /p:Version="$VERSION"
          dotnet pack ./src/Quartz.Plugins.RecentHistory.EFCoreNpgsql/Quartz.Plugins.RecentHistory.EFCoreNpgsql.csproj --configuration Release --no-restore --output ./artifacts /p:GeneratePackageOnBuild=false /p:Version="$VERSION"
          dotnet pack ./src/Quartz.Plugins.RecentHistory.EFCoreSqlite/Quartz.Plugins.RecentHistory.EFCoreSqlite.csproj --configuration Release --no-restore --output ./artifacts /p:GeneratePackageOnBuild=false /p:Version="$VERSION"
          dotnet pack ./src/Quartz.Plugins.RecentHistory.EFCoreMySql/Quartz.Plugins.RecentHistory.EFCoreMySql.csproj --configuration Release --no-restore --output ./artifacts /p:GeneratePackageOnBuild=false /p:Version="$VERSION"
          dotnet pack ./src/SilkierQuartz/SilkierQuartz.csproj --configuration Release --no-restore --output ./artifacts /p:GeneratePackageOnBuild=false /p:Version="$VERSION"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg

      - name: Publish to NuGet
        if: env.NUGET_API_KEY != ''
        shell: bash
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
